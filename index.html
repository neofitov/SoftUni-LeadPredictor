<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LeadPredictor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">&#9673;</span>
        <span class="logo-text"><strong>Lead</strong>Predictor</span>
      </div>
      <div class="header-meta" id="campaignMeta">Campaign: loading…</div>
    </header>

    <!-- Main layout -->
    <main class="main">

      <!-- Left Sidebar: Inputs -->
      <aside class="sidebar">
        <div class="field">
          <label>Language</label>
          <select id="language">
            <option value="en">🇺🇸 English</option>
            <option value="bg">🇧🇬 Bulgarian</option>
          </select>
        </div>

        <div class="field">
          <label>Currency</label>
          <select id="currency">
            <option value="USD">$ US Dollar</option>
            <option value="EUR">€ Euro</option>
            <option value="BGN">лв BGN</option>
          </select>
        </div>

        <div class="field">
          <label>Campaign Start</label>
          <input type="date" id="campaignStart" value="2026-05-08" />
        </div>

        <div class="field">
          <label>Campaign End</label>
          <input type="date" id="campaignEnd" value="2026-11-04" />
        </div>

        <div class="field">
          <label>Total Revenue</label>
          <div class="input-prefix">
            <span id="currencySymbol">$</span>
            <input type="number" id="totalRevenue" value="10000" min="0" />
          </div>
        </div>

        <div class="field">
          <label>Avg. Order Value</label>
          <div class="input-prefix">
            <span id="currencySymbol2">$</span>
            <input type="number" id="avgOrderValue" value="1000" min="1" />
          </div>
        </div>
      </aside>

      <!-- Center: Chart -->
      <section class="chart-section">
        <div class="chart-container">
          <canvas id="chart" role="img" aria-label="Sales funnel bar chart showing monthly prospects, leads and customers"></canvas>
          <div id="tooltip" class="tooltip hidden"></div>
        </div>

        <!-- Sliders -->
        <div class="sliders">
          <div class="slider-field">
            <label>Lead Response Rate</label>
            <input type="range" id="leadRate" min="1" max="100" value="40" />
            <span id="leadRateVal">40.00%</span>
          </div>
          <div class="slider-field">
            <label>Prospect Response Rate</label>
            <input type="range" id="prospectRate" min="1" max="100" value="20" />
            <span id="prospectRateVal">20.00%</span>
          </div>
        </div>
      </section>

      <!-- Right: Stats Cards -->
      <aside class="stats">
        <div class="stat-card" id="cardProspects">
          <div class="stat-header">
            <span class="stat-icon prospects-icon">&#128193;</span>
            <span class="stat-label">Prospects</span>
            <span class="stat-pct" id="pctProspects">100%</span>
          </div>
          <div class="stat-value" id="valProspects">125</div>
          <div class="stat-bar"><div class="stat-bar-fill prospects-bar" id="barProspects" style="width:100%"></div></div>
          <div class="stat-sub" id="subProspects">of campaign total</div>
        </div>

        <div class="stat-card" id="cardLeads">
          <div class="stat-header">
            <span class="stat-icon leads-icon">&#128100;</span>
            <span class="stat-label">Leads</span>
            <span class="stat-pct" id="pctLeads">20%</span>
          </div>
          <div class="stat-value" id="valLeads">25</div>
          <div class="stat-bar"><div class="stat-bar-fill leads-bar" id="barLeads" style="width:20%"></div></div>
          <div class="stat-sub" id="subLeads">of prospects</div>
        </div>

        <div class="stat-card" id="cardCustomers">
          <div class="stat-header">
            <span class="stat-icon customers-icon">&#127942;</span>
            <span class="stat-label">Customers</span>
            <span class="stat-pct" id="pctCustomers">8%</span>
          </div>
          <div class="stat-value" id="valCustomers">10</div>
          <div class="stat-bar"><div class="stat-bar-fill customers-bar" id="barCustomers" style="width:8%"></div></div>
          <div class="stat-sub" id="subCustomers">of prospects</div>
        </div>
      </aside>

    </main>
  </div>

  <script src="app.js"></script>
  <script src="locale.js"></script>
  <script src="calculations.js"></script>
</body>
</html>
